<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrani Sinha | Command Palette</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cursor-square" id="cursorSquare"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="app-shell">
    <header class="top-header">
      <div class="mac-dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>

      <button class="header-command-trigger" id="openPaletteBtn" type="button">
        <span class="trigger-left">
          <span class="search-icon">⌕</span>
          <span class="trigger-text">agrani-sinha : portfolio</span>
        </span>
        <span class="trigger-right">
          <span class="keycap">Ctrl</span>
          <span class="keycap">P</span>
        </span>
      </button>

      <div class="header-spacer"></div>
    </header>

    <main class="fake-editor">
      <div class="fake-sidebar"></div>
      <div class="fake-main">
        <div class="fake-title">Agrani Sinha</div>
        <div class="fake-subtitle">AI × Healthcare × Systems</div>
      </div>
    </main>
  </div>

  <div class="palette-overlay" id="paletteOverlay" aria-hidden="true">
    <div class="palette-backdrop" id="paletteBackdrop"></div>

    <div class="palette-box" id="paletteBox" role="dialog" aria-modal="true" aria-label="Command palette">
      <div class="palette-top">
        <span class="palette-leading">›</span>
        <input
          id="paletteInput"
          class="palette-input"
          type="text"
          placeholder="Go to file or run command..."
          autocomplete="off"
        />
        <span class="palette-esc">Esc</span>
      </div>

      <div class="palette-list" id="paletteList">
        <div class="palette-section-label">COMMANDS</div>

        <button class="palette-item active" data-index="0" type="button">
          <span class="palette-left">
            <span class="palette-icon star">✧</span>
            <span class="palette-text">Open Agrani's Copilot</span>
          </span>
          <span class="palette-meta shortcut">Ctrl+Shift+C</span>
        </button>

        <div class="palette-section-label">FILES</div>

        <button class="palette-item" data-index="1" type="button">
          <span class="palette-left">
            <span class="palette-icon react">⚛</span>
            <span class="palette-text">home.tsx</span>
          </span>
          <span class="palette-meta">src/</span>
        </button>

        <button class="palette-item" data-index="2" type="button">
          <span class="palette-left">
            <span class="palette-icon html">◫</span>
            <span class="palette-text">about.html</span>
          </span>
          <span class="palette-meta">src/</span>
        </button>

        <button class="palette-item" data-index="3" type="button">
          <span class="palette-left">
            <span class="palette-icon js">JS</span>
            <span class="palette-text">projects.js</span>
          </span>
          <span class="palette-meta">src/</span>
        </button>

        <button class="palette-item" data-index="4" type="button">
          <span class="palette-left">
            <span class="palette-icon json">{ }</span>
            <span class="palette-text">skills.json</span>
          </span>
          <span class="palette-meta">data/</span>
        </button>

        <button class="palette-item" data-index="5" type="button">
          <span class="palette-left">
            <span class="palette-icon ts">TS</span>
            <span class="palette-text">experience.ts</span>
          </span>
          <span class="palette-meta">src/</span>
        </button>

        <button class="palette-item" data-index="6" type="button">
          <span class="palette-left">
            <span class="palette-icon css">◧</span>
            <span class="palette-text">contact.css</span>
          </span>
          <span class="palette-meta">src/</span>
        </button>

        <button class="palette-item" data-index="7" type="button">
          <span class="palette-left">
            <span class="palette-icon md">≣</span>
            <span class="palette-text">README.md</span>
          </span>
          <span class="palette-meta">./</span>
        </button>
      </div>

      <div class="palette-footer">
        <span>↑↓ navigate</span>
        <span>↵ open</span>
        <span>Esc close</span>
        <span class="palette-footer-tip">Tip: type "copilot" to open AI chat</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrani Sinha | Mobile Portfolio</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- MOBILE CSS -->
  <link rel="stylesheet" href="mobile.css" />
</head>

<body class="mobile-page">

  <!-- ================= HEADER ================= -->
  <header class="mobile-header">
    <div class="header-left">
      <span class="logo">⚡ Agrani</span>
    </div>

    <div class="header-right">
      <button onclick="openCommand()" title="Command Palette">⌕</button>
      <button onclick="toggleCopilot()" title="Copilot">✨</button>
    </div>
  </header>

  <!-- ================= MAIN EDITOR ================= -->
  <main class="mobile-editor" id="mobileEditor">
    <div class="editor-content">
      <h2>Welcome 👋</h2>
      <p>Tap below to explore your VS Code-style portfolio</p>
    </div>
  </main>

  <!-- ================= BOTTOM NAV (VS CODE STYLE) ================= -->
  <nav class="bottom-nav">
    <button onclick="openPanel('explorer')">
      📁
      <span>Files</span>
    </button>

    <button onclick="openPanel('search')">
      🔍
      <span>Search</span>
    </button>

    <button onclick="openPanel('terminal')">
      🖥
      <span>Terminal</span>
    </button>

    <button onclick="openPanel('settings')">
      ⚙️
      <span>Settings</span>
    </button>
  </nav>

  <!-- ================= SLIDE PANEL ================= -->
  <div class="mobile-panel" id="mobilePanel">

    <div class="panel-header">
      <span id="panelTitle">Explorer</span>
      <button onclick="closePanel()">×</button>
    </div>

    <div class="panel-body" id="panelContent">
      <!-- Dynamic content loads here -->
    </div>

  </div>

  <!-- ================= COPILOT SIDEBAR ================= -->
  <div class="mobile-copilot" id="mobileCopilot">

    <div class="copilot-header">
      <span>✨ Agrani Copilot</span>
      <button onclick="toggleCopilot()">×</button>
    </div>

    <div class="copilot-body" id="copilotMessages">
      <div class="bot-msg">
        Hi 👋 Ask me about projects, experience, skills, or contact details.
      </div>
    </div>

    <div class="copilot-input">
      <input
        id="copilotInput"
        type="text"
        placeholder="Ask something..."
      />
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

  <!-- ================= COMMAND PALETTE ================= -->
  <div class="command-overlay" id="commandOverlay">

    <div class="command-box">
      <input
        type="text"
        placeholder="Type a command..."
        id="commandInput"
      />

      <div class="command-list" id="commandList">
        <div onclick="loadPage('home')">Open Home</div>
        <div onclick="loadPage('projects')">Open Projects</div>
        <div onclick="loadPage('skills')">Open Skills</div>
        <div onclick="loadPage('contact')">Open Contact</div>
      </div>
    </div>

  </div>

  <!-- ================= OVERLAY BACKDROP ================= -->
  <div class="mobile-backdrop" id="mobileBackdrop" onclick="closeAllMobile()"></div>

  <!-- ================= JS ================= -->
  <script src="mobile.js"></script>

</body>
  </html>

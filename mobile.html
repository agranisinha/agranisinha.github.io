<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agrani Portfolio Mobile</title>

  <link rel="stylesheet" href="mobile.css">
</head>

<body class="mobile-page">

  <!-- BACKDROP -->
  <div class="mobile-backdrop"></div>

  <!-- MAIN SCREEN -->
  <div class="mobile-container">

    <!-- HEADER -->
    <div class="mobile-header">
      <div class="logo">VS Code</div>
      <div class="header-actions">
        <button onclick="openMobilePanel('settings')">⚙️</button>
      </div>
    </div>

    <!-- EDITOR -->
    <div id="editorContent" class="editor">
      <h2>Welcome 👋</h2>
      <p>This is mobile VS Code UI</p>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div id="sidebarPanel" class="panel m-sidebar">
    <h3>Explorer</h3>
    <div class="file" onclick="openTab('home')">home.tsx</div>
    <div class="file" onclick="openTab('about')">about.html</div>
    <div class="file" onclick="openTab('projects')">projects.js</div>
  </div>

  <!-- COPILOT -->
  <div id="copilotSidebar" class="panel m-copilot">
    <h3>Copilot</h3>

    <div id="copilotMessages" class="copilot-messages"></div>

    <div class="copilot-input">
      <input id="copilotInput" placeholder="Ask something..." />
      <button id="copilotSend">Send</button>
    </div>
  </div>

  <!-- TERMINAL -->
  <div id="terminalPanel" class="panel m-terminal">
    <h3>Terminal</h3>
    <div id="terminalBody" class="terminal-body"></div>
    <input id="terminalInput" placeholder="Type command..." />
  </div>

  <!-- SETTINGS -->
  <div id="settingsPanel" class="panel m-settings">
    <h3>Settings</h3>
    <button onclick="alert('Theme change')">Change Theme</button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button onclick="openMobilePanel('explorer')">📁</button>
    <button onclick="openMobilePanel('terminal')">💻</button>
    <button onclick="openMobilePanel('copilot')">🤖</button>
    <button onclick="openMobilePanel('settings')">⚙️</button>
  </div>

  <script src="mobile.js"></script>
</body>
</html>
